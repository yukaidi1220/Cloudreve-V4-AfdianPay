services:
  afd-pay:
    image: ghcr.nju.edu.cn/yukaidi1220/cloudreve-v4-afdianpay:latest
    container_name: afd-pay
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 500M
