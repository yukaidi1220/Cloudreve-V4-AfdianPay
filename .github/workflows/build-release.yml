name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: afd-pay-windows-amd64.exe
            pyinstaller_args: --onefile --console
          - os: ubuntu-latest
            artifact_name: afd-pay-linux-amd64
            pyinstaller_args: --onefile --console
          - os: macos-latest
            artifact_name: afd-pay-macos-amd64
            pyinstaller_args: --onefile --console

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} --name afd-pay --distpath ./dist --workpath ./build src/afd_pay/main.py

      - name: Rename artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv afd-pay.exe ${{ matrix.artifact_name }}
          else
            mv afd-pay ${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
